<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세종사업히스토리 — KPI 영역</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F8FA; --card:#FFFFFF; --border:#E6E8EC;
    --text:#1A1F2B; --text-dim:#6B7280;
    --navy:#1B2A4A; --lightblue:#A9C6E8; --red:#C53030; --blue:#2B6CB0;
    --amber:#B8860B; --amber-soft:rgba(214,158,46,.12);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:'Pretendard','IBM Plex Mono',sans-serif; padding:32px 28px 60px;}
  .mono{font-family:'IBM Plex Mono', monospace;}
  .wrap{max-width:1180px; margin:0 auto;}
  h1{font-size:22px; font-weight:700; margin-bottom:4px;}
  .sub{color:var(--text-dim); font-size:13px; margin-bottom:20px;}

  .top-row{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
  .toggle{
    font-family:'IBM Plex Mono', monospace; font-size:12.5px; font-weight:600;
    border:1px solid var(--border); background:#fff; color:var(--text-dim);
    padding:8px 16px; border-radius:8px; cursor:pointer; transition:.2s;
  }
  .toggle.active{border-color:var(--amber); color:var(--amber); background:var(--amber-soft);}

  .kpi-row{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:18px;}
  @media(max-width:980px){.kpi-row{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:640px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
  .kpi-tile{
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:16px 16px 14px; box-shadow:0 1px 2px rgba(0,0,0,.03);
  }
  .kpi-cap{font-size:12px; color:var(--text-dim); margin-bottom:8px; font-weight:500;}
  .kpi-val{font-family:'IBM Plex Mono', monospace; font-size:23px; font-weight:700; color:var(--text); line-height:1;}
  .kpi-sub{font-size:11.5px; color:var(--text-dim); margin-top:6px;}
  .kpi-val.up{color:var(--blue);} .kpi-val.down{color:var(--red);}

  body.colorful .kpi-tile.share{background:linear-gradient(160deg, rgba(99,102,241,.10), #fff); border-color:rgba(99,102,241,.35);}
  body.colorful .kpi-tile.share .kpi-val{color:#6366F1;}
  body.colorful .kpi-tile.rev{background:linear-gradient(160deg, rgba(43,108,176,.10), #fff); border-color:rgba(43,108,176,.35);}
  body.colorful .kpi-tile.rev .kpi-val{color:var(--blue);}
  body.colorful .kpi-tile.margin{background:linear-gradient(160deg, rgba(13,148,136,.10), #fff); border-color:rgba(13,148,136,.35);}
  body.colorful .kpi-tile.margin .kpi-val{color:#0D9488;}
  body.colorful .kpi-tile.margin .kpi-val.down{color:var(--red);}

  .cashcow{
    border-radius:14px; padding:22px 26px; display:flex; align-items:center; gap:22px;
    background:var(--card); border:1px solid var(--border);
  }
  body.colorful .cashcow{
    background:linear-gradient(120deg, rgba(214,158,46,.14), rgba(214,158,46,.03));
    border-color:rgba(214,158,46,.45);
  }
  .cashcow-icon{font-size:38px; flex-shrink:0;}
  .cashcow-num{font-family:'IBM Plex Mono', monospace; font-size:34px; font-weight:700; color:var(--amber); line-height:1;}
  .cashcow-tag{
    font-family:'IBM Plex Mono', monospace; font-size:11px; font-weight:700; color:#fff;
    background:var(--amber); display:inline-block; padding:3px 9px; border-radius:6px; margin-bottom:8px; letter-spacing:.04em;
  }
  .cashcow-cap{font-size:13px; color:var(--text-dim); margin-top:6px;}
  .cashcow-text{font-size:14px; line-height:1.6; margin-top:4px;}
</style>
</head>
<body class="colorful">
<div class="wrap">

  <div class="top-row">
    <div>
      <h1>세종사업히스토리</h1>
      <div class="sub">2026년 기준</div>
    </div>
    <div class="toggle active" id="colorfulToggle">🎨 컬러풀 ON</div>
  </div>

  <!-- KPI 5개 -->
  <div class="kpi-row">
    <div class="kpi-tile share">
      <div class="kpi-cap">수행조직 대비 매출 비중</div>
      <div class="kpi-val">14.3%</div>
      <div class="kpi-sub">세종 50.6억 / 수행조직 354.6억</div>
    </div>
    <div class="kpi-tile rev">
      <div class="kpi-cap">2026년 매출</div>
      <div class="kpi-val">50.6억</div>
    </div>
    <div class="kpi-tile rev">
      <div class="kpi-cap">전년대비 매출</div>
      <div class="kpi-val up">▲12.4%</div>
      <div class="kpi-sub">+5.6억</div>
    </div>
    <div class="kpi-tile margin">
      <div class="kpi-cap">2026년 매출이익률</div>
      <div class="kpi-val">16.2%</div>
    </div>
    <div class="kpi-tile margin">
      <div class="kpi-cap">전년대비 매출이익률</div>
      <div class="kpi-val down">▼0.5%p</div>
      <div class="kpi-sub">16.7% → 16.2%</div>
    </div>
  </div>

  <!-- 캐시카우 강조 배너 -->
  <div class="cashcow">
    <div class="cashcow-icon">🐄</div>
    <div>
      <div class="cashcow-tag">CASH COW</div>
      <div class="cashcow-num">42.5억</div>
      <div class="cashcow-cap">2026년 운영매출 — 역대 최고, 최초 40억 돌파 (직전 최고 2024년 37.5억 대비 +5.0억)</div>
      <div class="cashcow-text">안정적인 운영매출이 꾸준히 늘며, 세종개발본부의 핵심 수익 기반이 더 단단해지고 있습니다.</div>
    </div>
  </div>

</div>

<script>
document.getElementById('colorfulToggle').addEventListener('click', (e)=>{
  document.body.classList.toggle('colorful');
  const on = document.body.classList.contains('colorful');
  e.target.textContent = on ? '🎨 컬러풀 ON' : '🎨 컬러풀 OFF';
  e.target.classList.toggle('active', on);
});
</script>
</body>
</html>
