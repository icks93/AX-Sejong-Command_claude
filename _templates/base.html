<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AX Sejong Command — [페이지 제목]</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
    <div class="shell">

        <!-- ═══════════════════════════════
             사이드바 — 메뉴 추가 시 여기만 수정
             새 탭 추가:
               <div class="menu-item">
                 <i class="ti ti-[아이콘명]"></i>
                 <span>[메뉴명]</span>
               </div>
        ═══════════════════════════════ -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-title">AX Sejong<br>Command</div>
                <div class="logo-sub">세종개발본부</div>
            </div>

            <div class="sidebar-section">
                <div class="section-label">현황</div>
                <div class="menu-item" data-tab="projects">
                    <i class="ti ti-layout-dashboard"></i>
                    <span>세종사업현황</span>
                </div>
                <div class="menu-item" data-tab="weekly">
                    <i class="ti ti-report"></i>
                    <span>PM 주간회의</span>
                </div>
                <div class="menu-item" data-tab="issues">
                    <i class="ti ti-alert-triangle"></i>
                    <span>이슈 조기경보</span>
                </div>
                <div class="menu-item soon">
                    <i class="ti ti-sitemap"></i>
                    <span>조직도</span>
                    <span class="sidebar-badge">예정</span>
                </div>
                <div class="menu-item soon">
                    <i class="ti ti-chart-line"></i>
                    <span>손익현황</span>
                    <span class="sidebar-badge">예정</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-label">실행</div>
                <div class="menu-item" data-tab="automation">
                    <i class="ti ti-player-play"></i>
                    <span>자동화 실행</span>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">익스</div>
                    <div class="user-name">노승익 본부장</div>
                </div>
            </div>
        </aside>

        <!-- 메인 영역 -->
        <main class="main">

            <!-- ═══════════════════════════════
                 Topbar — 제목/서브타이틀만 바꾸면 됨
            ═══════════════════════════════ -->
            <header class="topbar">
                <div class="topbar-left">
                    <div class="topbar-title">[페이지 제목]</div>
                    <div class="topbar-subtitle">[서브타이틀]</div>
                </div>
                <button id="btn-refresh" class="btn-refresh">
                    <i class="ti ti-refresh"></i>
                    새로고침
                </button>
            </header>

            <!-- ═══════════════════════════════
                 콘텐츠 영역
                 탭별로 div#tab-[이름] 추가
                 active인 탭만 display:block
            ═══════════════════════════════ -->
            <div class="content">

                <!-- ── 탭: 세종사업현황 ── -->
                <div id="tab-projects" class="tab-content active">

                    <!-- KPI 박스 4개 -->
                    <div class="kpi-grid">
                        <div class="kpi-card kpi-blue">
                            <div class="kpi-label">총 수행 사업</div>
                            <div class="kpi-value" id="kpi-total">—</div>
                            <div class="kpi-sub">2026년 기준</div>
                        </div>
                        <div class="kpi-card kpi-green">
                            <div class="kpi-label">총 매출액</div>
                            <div class="kpi-value" id="kpi-revenue">—</div>
                            <div class="kpi-sub">부가세 제외</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">운영중</div>
                            <div class="kpi-value" id="kpi-active">—</div>
                            <div class="kpi-sub">신규 포함</div>
                        </div>
                        <div class="kpi-card kpi-red">
                            <div class="kpi-label">종료</div>
                            <div class="kpi-value" id="kpi-closed">—</div>
                            <div class="kpi-sub">5/15 완료</div>
                        </div>
                    </div>

                    <!-- 사업 목록 테이블 -->
                    <div class="table-wrap">
                        <div class="table-header">
                            <span class="table-title">사업 목록</span>
                            <span class="table-count" id="project-count">—건</span>
                        </div>
                        <div class="table-container">
                            <table class="projects-table">
                                <colgroup>
                                    <col style="width:32%">
                                    <col style="width:17%">
                                    <col style="width:9%">
                                    <col style="width:12%">
                                    <col style="width:17%">
                                    <col style="width:13%">
                                </colgroup>
                                <thead>
                                    <tr>
                                        <th>사업명</th>
                                        <th>고객사</th>
                                        <th>PM</th>
                                        <th>매출액</th>
                                        <th>계약기간</th>
                                        <th>상태</th>
                                    </tr>
                                </thead>
                                <tbody id="projects-tbody">
                                    <tr>
                                        <td colspan="6" class="loading-cell">데이터를 불러오는 중...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- ── 탭: PM 주간회의 (Phase 2에서 내용 채울 것) ── -->
                <div id="tab-weekly" class="tab-content">
                    <div class="empty-state">
                        <i class="ti ti-report"></i>
                        <p>PM 주간회의 — Phase 2에서 구현 예정</p>
                    </div>
                </div>

                <!-- ── 탭: 이슈 조기경보 (Phase 3에서 내용 채울 것) ── -->
                <div id="tab-issues" class="tab-content">
                    <div class="empty-state">
                        <i class="ti ti-alert-triangle"></i>
                        <p>이슈 조기경보 — Phase 3에서 구현 예정</p>
                    </div>
                </div>

                <!-- ── 탭: 자동화 실행 (Phase 4에서 내용 채울 것) ── -->
                <div id="tab-automation" class="tab-content">
                    <div class="empty-state">
                        <i class="ti ti-player-play"></i>
                        <p>자동화 실행 — Phase 4에서 구현 예정</p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- 툴팁 컨테이너 (body 최상단 — overflow 영향 없음) -->
    <div id="tooltip-box" class="tooltip-box"></div>

    <script src="/static/main.js"></script>
</body>
</html>
